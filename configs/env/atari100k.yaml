task: atari_alien
# Match official danijar/dreamerv3 `atari100k` preset: run.steps=1.1e5, envs=1, train_ratio=256,
# eval_envs=4, eval_eps=1 (this repo uses eval_episode_num parallel eval envs; one episode each in trainer.eval).
steps: 1.1e5
env_num: 1
eval_episode_num: 4
action_repeat: 4
train_ratio: 256
time_limit: 108000

seed: ${seed}
device: ${device}

size: [64, 64]
encoder:
  mlp_keys: '$^'
  cnn_keys: 'image'
decoder:
  mlp_keys: '$^'
  cnn_keys: 'image'

gray: False
noops: 30
lives: unused
sticky: False
actions: needed
pooling: 2
aggregate: max
resize: pillow
autostart: False
clip_reward: False
